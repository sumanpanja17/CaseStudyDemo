<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Case Study Demo</title>
  <script
    src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.f,sap.ui.layout"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-frameOptions="allow">
  </script>
  <script>
    sap.ui.getCore().attachInit(function () {

      var apps = [
        {
          header     : "Employee",
          subheader  : "Manage Employees",
          icon       : "sap-icon://employee",
          color      : "Accent1",
          url        : "/employee/index.html"
        },
        {
          header     : "Learning",
          subheader  : "Manage Courses",
          icon       : "sap-icon://learning-assistant",
          color      : "Accent2",
          url        : "/learning/index.html"
        },
        {
          header     : "Project",
          subheader  : "Manage Projects",
          icon       : "sap-icon://project-definition-triangle",
          color      : "Accent3",
          url        : "/project/index.html"
        },
        {
          header     : "Test",
          subheader  : "Test Tile",
          icon       : "sap-icon://project-definition-triangle",
          color      : "Accent3",
          url        : ""
        }
      ];

      var tiles = apps.map(function (app) {
        return new sap.m.GenericTile({
          header      : app.header,
          subheader   : app.subheader,
          frameType   : sap.m.FrameType.OneByOne,
          tileContent : [
            new sap.m.TileContent({
              content: new sap.m.ImageContent({
                src: app.icon
              })
            })
          ],
          press: function () {
            window.location.href = app.url;
          }
        }).addStyleClass("sapUiTinyMargin");
      });

      new sap.m.Shell({
        appWidthLimited : false,
        app: new sap.m.App({
          pages: [
            new sap.m.Page({
              title          : "Case Study Demo",
              showHeader     : true,
              backgroundDesign: sap.m.PageBackgroundDesign.List,
              content        : [
                new sap.m.Panel({
                  headerText     : "My Applications",
                  backgroundDesign: sap.m.BackgroundDesign.Solid,
                  content        : [
                    new sap.m.FlexBox({
                      wrap           : sap.m.FlexWrap.Wrap,
                      justifyContent : sap.m.FlexJustifyContent.Start,
                      alignItems     : sap.m.FlexAlignItems.Start,
                      renderType     : sap.m.FlexRendertype.Bare,
                      items          : tiles
                    }).addStyleClass("sapUiSmallMargin")
                  ]
                }).addStyleClass("sapUiResponsiveMargin")
              ]
            })
          ]
        })
      }).placeAt("content");

    });
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
